<!DOCTYPE html>
<html lang="pt-br">
  
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
      Login - Sistema
    </title>
    <link rel="stylesheet" href="../css/Font.css">
  </head>
  
  <body>
    <div class="login">
      <div class="window login-box">
        <div class="title-bar">
          Autenticação do Usuário
        </div>
        <div class="content">
          <form action="index3.html" method="POST" class="login-form">
            <div class="field">
              <label for="user">Usuário:</label>
              <input type="text" id="user" name="user" required>
            </div>
            <div class="field">
              <label for="pass">Senha:</label>
              <input type="password" id="pass" name="pass" required>
            </div>
            <button type="submit" class="moldura">Entrar no Sistema</button>
          </form>
        </div>
      </div>
    </div>
  </body>

</html>
